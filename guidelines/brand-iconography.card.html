<!-- @dsCard group="Brand" viewport="700x150" name="Iconography" subtitle="Lucide line icons, 1.5px stroke, currentColor — ↗ as the external-link tic" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"><script src="https://unpkg.com/lucide@latest"></script></head>
<body style="padding:24px;display:flex;flex-direction:column;gap:16px">
  <div style="display:flex;gap:20px;color:var(--text-secondary);align-items:center">
    <i data-lucide="arrow-right" style="width:18px;height:18px"></i>
    <i data-lucide="arrow-up-right" style="width:18px;height:18px"></i>
    <i data-lucide="mail" style="width:18px;height:18px"></i>
    <i data-lucide="menu" style="width:18px;height:18px"></i>
    <i data-lucide="x" style="width:18px;height:18px"></i>
    <i data-lucide="globe" style="width:18px;height:18px"></i>
    <i data-lucide="smartphone" style="width:18px;height:18px"></i>
    <i data-lucide="code-2" style="width:18px;height:18px"></i>
    <i data-lucide="pen-tool" style="width:18px;height:18px"></i>
    <i data-lucide="check" style="width:18px;height:18px;color:var(--positive)"></i>
    <i data-lucide="chevron-down" style="width:18px;height:18px"></i>
  </div>
  <div style="display:flex;gap:24px;align-items:baseline">
    <a href="#" style="color:var(--text-body);font-size:14px;text-decoration:none;font-weight:500">View project <span style="color:var(--text-accent)">↗</span></a>
    <a href="#" style="color:var(--text-body);font-size:14px;text-decoration:none;font-weight:500">Start a project <span style="color:var(--text-accent)">→</span></a>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
