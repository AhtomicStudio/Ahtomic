<!-- @dsCard group="Colors" viewport="700x150" name="Accent red" subtitle="One vibrant signal red — under 5% of any screen" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:16px">
<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:8px">
  <div style="background:var(--red-500);border-radius:8px;height:76px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#fff">--red-500 / --accent</span><span style="font-family:var(--font-mono);font-size:10px;color:rgba(255,255,255,.75)">#ff3b2f · CTA</span></div>
  <div style="background:var(--red-400);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#2b0503">--red-400</span><span style="font-family:var(--font-mono);font-size:10px;color:#4b100c">hover</span></div>
  <div style="background:var(--red-600);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#ffd9d6">--red-600</span><span style="font-family:var(--font-mono);font-size:10px;color:#f2aca6">press</span></div>
  <div style="background:var(--red-700);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#ffd9d6">--red-700</span><span style="font-family:var(--font-mono);font-size:10px;color:#f2aca6">deep</span></div>
  <div style="background:var(--red-tint);border:1px solid var(--line-accent);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:var(--red-400)">--red-tint</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">subtle fill</span></div>
</div>
</body></html>
