<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Near-black neutral steps — warm, never blue" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:16px">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
  <div style="background:var(--black-950);border:1px solid var(--line-1);border-radius:8px;height:76px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--black-950</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)">#0a0a0b · page</span></div>
  <div style="background:var(--black-900);border:1px solid var(--line-1);border-radius:8px;height:76px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--black-900</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)">#101012</span></div>
  <div style="background:var(--black-850);border:1px solid var(--line-1);border-radius:8px;height:76px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--black-850</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)">#141416 · card</span></div>
  <div style="background:var(--black-800);border:1px solid var(--line-1);border-radius:8px;height:76px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--black-800</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)">#1a1a1d · raised</span></div>
  <div style="background:var(--black-700);border:1px solid var(--line-1);border-radius:8px;height:76px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--black-700</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-secondary)">#232327</span></div>
</div>
</body></html>
