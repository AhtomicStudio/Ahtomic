<!-- @dsCard group="Spacing" viewport="700x130" name="Spacing scale" subtitle="4px base — sections breathe at 96–128px" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:24px;display:flex;align-items:flex-end;gap:12px">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-1);height:var(--space-1);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">4</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-2);height:var(--space-2);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">8</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-3);height:var(--space-3);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">12</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-4);height:var(--space-4);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">16</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-6);height:var(--space-6);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">24</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-8);height:var(--space-8);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">32</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-12);height:var(--space-12);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">48</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-16);height:var(--space-16);background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">64</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:var(--space-24);height:var(--space-24);background:var(--red-700)"></div><span style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted)">96</span></div>
</body></html>
