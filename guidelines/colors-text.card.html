<!-- @dsCard group="Colors" viewport="700x140" name="Text opacities" subtitle="White at four levels — hierarchy without new colors" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:20px 24px;display:flex;flex-direction:column;gap:10px">
  <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:17px;font-weight:600;color:var(--text-body)">Primary text carries the message</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--text-body · #fafaf8</span></div>
  <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:15px;color:var(--text-secondary)">Secondary text explains it</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--text-secondary · 66%</span></div>
  <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:14px;color:var(--text-muted)">Muted text annotates quietly</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--text-muted · 42%</span></div>
  <div style="display:flex;justify-content:space-between;align-items:baseline"><span style="font-size:14px;color:var(--text-disabled)">Disabled text steps back</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted)">--text-disabled · 24%</span></div>
</body></html>
