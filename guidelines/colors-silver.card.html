<!-- @dsCard group="Colors" viewport="700x150" name="Silver" subtitle="Cool metallic neutrals — secondary text, lines, and quiet shine" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:16px">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1.4fr;gap:8px">
  <div style="background:var(--silver-100);border-radius:8px;height:76px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#3a3d43">--silver-100</span><span style="font-family:var(--font-mono);font-size:10px;color:#6a6e77">#eef0f3</span></div>
  <div style="background:var(--silver-200);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#3a3d43">--silver-200</span><span style="font-family:var(--font-mono);font-size:10px;color:#6a6e77">#d9dce2</span></div>
  <div style="background:var(--silver-300);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#2c2f34">--silver-300</span><span style="font-family:var(--font-mono);font-size:10px;color:#4c4f56">secondary text</span></div>
  <div style="background:var(--silver-400);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#1e2024">--silver-400</span><span style="font-family:var(--font-mono);font-size:10px;color:#33363c">#9aa0ab</span></div>
  <div style="background:var(--silver-500);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#eef0f3">--silver-500</span><span style="font-family:var(--font-mono);font-size:10px;color:#c8ccd3">muted text</span></div>
  <div style="background:var(--silver-sheen);border-radius:8px;padding:8px;display:flex;flex-direction:column;justify-content:flex-end"><span style="font-family:var(--font-mono);font-size:10px;color:#2c2f34">--silver-sheen</span><span style="font-family:var(--font-mono);font-size:10px;color:#4c4f56">metallic gradient · display accents</span></div>
</div>
</body></html>
