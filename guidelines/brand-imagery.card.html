<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:20px 24px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div style="background:var(--surface-card);border:1px solid var(--line-1);border-radius:var(--radius-xl);padding:12px">
    <img src="../assets/portfolio/cannapickforme/age-gate.png" alt="CannaPickForMe" style="width:100%;height:110px;object-fit:cover;object-position:top;border-radius:var(--radius-md);border:1px solid var(--line-1);display:block">
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--line-1);border-radius:var(--radius-xl);padding:12px">
    <img src="../assets/portfolio/chalkboard/landing.png" alt="A Chalkboard for Two" style="width:100%;height:110px;object-fit:cover;border-radius:var(--radius-md);border:1px solid var(--line-1);display:block">
  </div>
</body></html>
