<!-- @dsCard group="Type" viewport="700x210" name="Type scale" subtitle="12–72px, tight tracking above 27px" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="padding:20px 24px;display:flex;flex-direction:column;gap:6px">
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:88px">--text-4xl 72</span><span style="font-size:36px;font-weight:700;letter-spacing:var(--tracking-display);line-height:1">Hero</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:88px">--text-2xl 36</span><span style="font-size:27px;font-weight:700;letter-spacing:var(--tracking-tight);line-height:1.1">Section heading</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:88px">--text-lg 21</span><span style="font-size:21px;font-weight:600">Card title</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:88px">--text-base 15</span><span style="font-size:15px;color:var(--text-secondary)">Body copy</span></div>
  <div style="display:flex;align-items:baseline;gap:16px"><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:88px">--text-xs 12</span><span style="font-family:var(--font-mono);font-size:12px;letter-spacing:var(--tracking-label);text-transform:uppercase;color:var(--text-muted)">Label</span></div>
</body></html>
