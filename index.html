<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ahtomic Studio — Websites and apps, built properly</title>
  <meta name="description" content="A small web studio in California shipping websites and mobile apps. One person directs every project; AI agents handle the build.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0b">
  <link rel="canonical" href="https://ahtomic.com/">

  <!-- Preconnects: fonts (render-blocking today) and the Firestore/Firebase
       origins the public site actually calls (Auth is admin-only — see
       src/firebaseAuth.js — so no preconnect for firebaseapp.com here). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="preconnect" href="https://firebase.googleapis.com">
  <link rel="preconnect" href="https://firebaseinstallations.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400..700&family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap">

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Social share cards (static; scrapers don't run JS) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Ahtomic Studio">
  <meta property="og:title" content="Ahtomic Studio — Websites and apps, built properly">
  <meta property="og:description" content="A small web studio in California shipping websites and mobile apps. One person directs every project; AI agents handle the build.">
  <meta property="og:url" content="https://ahtomic.com/">
  <meta property="og:image" content="https://ahtomic.com/og.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Ahtomic Studio — Websites and apps, built properly">
  <meta name="twitter:description" content="A small web studio in California shipping websites and mobile apps. One person directs every project; AI agents handle the build.">
  <meta name="twitter:image" content="https://ahtomic.com/og.png">

  <!-- Structured data: static, so crawlers that don't render JS still get
       an unambiguous signal about what this business is. Keep in sync with
       settings.siteDescription in the CMS if that copy changes materially. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "Ahtomic Studio",
    "url": "https://ahtomic.com/",
    "image": "https://ahtomic.com/og.png",
    "description": "A small web studio in California shipping websites and mobile apps. One person directs every project; AI agents handle the build.",
    "email": "ahtomicstudio@gmail.com",
    "areaServed": {
      "@type": "State",
      "name": "California"
    },
    "address": {
      "@type": "PostalAddress",
      "addressRegion": "CA",
      "addressCountry": "US"
    },
    "sameAs": []
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
