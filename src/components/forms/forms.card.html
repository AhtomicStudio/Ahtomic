<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body style="padding:20px">
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Radio, Switch } = window.AhtomicStudioDesignSystem_31497d;
const X = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>;
const Arrow = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14m-6-6 6 6-6 6"/></svg>;
function Demo() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <Button variant="primary">Start a project <Arrow /></Button>
        <Button variant="secondary">View work</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="primary" disabled>Disabled</Button>
        <Button variant="primary" size="sm">Small</Button>
        <IconButton label="Close" variant="secondary"><X /></IconButton>
        <IconButton label="Close" variant="ghost" size="sm"><X /></IconButton>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
        <Input label="Email" placeholder="you@company.com" hint="We reply within two days." />
        <Input label="Company" placeholder="Acme" error="Required." />
        <Select label="Budget" options={["Under $10k", "$10–50k", "$50k+"]} />
      </div>
      <div style={{ display: "flex", gap: 24, alignItems: "center", flexWrap: "wrap" }}>
        <Checkbox label="Website" defaultChecked />
        <Checkbox label="Mobile app" />
        <Checkbox label="Disabled" disabled />
        <Radio name="t" label="New build" defaultChecked />
        <Radio name="t" label="Redesign" />
        <Switch label="Updates" defaultChecked />
        <Switch label="Off" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
